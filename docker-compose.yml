services:
  backend_seed:
    container_name: marathon_backend
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.local
    env_file:
      - ./src/.env
    ports:
      - 4080:4000
    volumes:
      - ./src/src:/app/src
    depends_on:
      - postgres_seed
      - mongo_seed
      - gotenberg_seed
    networks:
      - marathon_network

  postgres_seed:
    build:
      context: ./postgres
      dockerfile: Dockerfile.local
    container_name: postgres_seed_marathon
    restart: unless-stopped
    env_file:
      - src/.env
    volumes:
      - ./postgres/dbdata:/var/lib/postgresql
    ports:
      - 5433:5432
    shm_size: 256mb
    networks:
      - marathon_network

  gotenberg_seed:
    image: gotenberg/gotenberg:8
    container_name: gottenberg_seed
    restart: unless-stopped
    networks:
      - marathon_network

  mongo_seed:
    image: mongo:8.2.6
    container_name: mongo_seed
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: marathon_logs
    volumes:
      - ./mongo/dbdata:/data/db
    ports:
      - 27019:27017
    networks:
      - marathon_network

networks:
  marathon_network:
    driver: bridge